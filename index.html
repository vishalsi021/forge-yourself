<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080808" />
    <meta
      name="description"
      content="FORGE is the 60-day complete self-mastery system for habits, mindset, identity, progress, and personal transformation."
    />
    <meta name="keywords" content="self improvement app, habit tracker, daily protocol, CBT, self mastery, productivity, mindset app" />
    <meta property="og:title" content="FORGE - 60-Day Complete Self-Mastery System" />
    <meta
      property="og:description"
      content="A production-grade self-mastery platform for identity, habits, mindset, finance, and progress tracking."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:url" content="https://forge-app-rho.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FORGE - 60-Day Complete Self-Mastery System" />
    <meta
      name="twitter:description"
      content="Build discipline, identity, and daily momentum with FORGE's 60-day transformation system."
    />
    <meta name="twitter:image" content="/og-image.svg" />
    <link rel="preload" href="/fonts/bebas-neue-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/barlow-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/barlow-condensed-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-96.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>FORGE - 60-Day Complete Self-Mastery System</title>
    <style>
      @font-face {
        font-family: 'Bebas Neue';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/bebas-neue-latin-400-normal.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Barlow';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/barlow-latin-400-normal.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Barlow Condensed';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/barlow-condensed-latin-700-normal.woff2') format('woff2');
      }

      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #080808;
        color: #f0ede8;
      }

      body {
        font-family: 'Barlow', sans-serif;
        background-image:
          radial-gradient(circle at top center, rgba(255, 215, 0, 0.08), transparent 34%),
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: auto, 48px 48px, 48px 48px;
        background-position: center top, center center, center center;
      }

      #root {
        min-height: 100vh;
      }

      .boot-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .boot-card {
        width: min(100%, 400px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(19, 19, 19, 0.94);
        padding: 24px;
        box-sizing: border-box;
      }

      .boot-label,
      .boot-button,
      .boot-divider {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.22em;
      }

      .boot-label,
      .boot-divider {
        font-size: 11px;
        color: rgba(168, 158, 144, 0.85);
      }

      .boot-title {
        margin: 8px 0 0;
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(48px, 11vw, 76px);
        line-height: 0.88;
        letter-spacing: 0.08em;
      }

      .boot-copy {
        margin: 14px 0 0;
        color: rgba(168, 158, 144, 0.92);
        font-size: 14px;
        line-height: 1.65;
      }

      .boot-actions {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }

      .boot-button {
        display: block;
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #ffd54a;
        color: #050505;
        text-align: center;
        box-sizing: border-box;
      }

      .boot-button.secondary {
        background: rgba(25, 25, 25, 0.98);
        color: #f0ede8;
      }

      .boot-divider {
        margin: 20px 0;
        text-align: center;
      }

      .boot-field {
        height: 46px;
        margin-top: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        opacity: 0.9;
      }

      .boot-footer {
        margin-top: 20px;
        font-size: 14px;
        text-align: center;
        color: rgba(168, 158, 144, 0.92);
      }

      .boot-footer span {
        color: #ffd54a;
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FORGE",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web",
        "url": "https://forge-app-rho.vercel.app",
        "description": "A complete self-mastery system for habits, identity, psychology, finance, and progress tracking.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-card" aria-hidden="true">
          <div class="boot-label">FORGE access</div>
          <h1 class="boot-title">Welcome back</h1>
          <p class="boot-copy">Pick up the protocol where you left it.</p>
          <div class="boot-actions">
            <div class="boot-button">Continue with Google</div>
            <div class="boot-button secondary">Continue with Apple</div>
          </div>
          <div class="boot-divider">or use email</div>
          <div class="boot-field"></div>
          <div class="boot-field"></div>
          <div class="boot-actions">
            <div class="boot-button">Enter FORGE</div>
          </div>
          <div class="boot-footer">New to FORGE? <span>Create one</span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
